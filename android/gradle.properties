org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=2G
android.useAndroidX=true
android.enableJetifier=true
# Ces deux lignes evitent une casse si Flutter impose plus tard AGP 9+ :
# elles forcent l'ancien systeme (compatible avec notre config actuelle)
# tant qu'on n'a pas migre volontairement.
android.newDsl=false
android.builtInKotlin=false
